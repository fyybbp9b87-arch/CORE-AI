<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMN CORE</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;500;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#060607;
--red:#ff3b3b;
--green:#00ff66;
--text:#f4f6f7;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'DM Sans',sans-serif;
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
}

header{
padding:14px;
text-align:center;
font-family:'Space Mono';
letter-spacing:3px;
background:rgba(0,0,0,0.6);
color:var(--text);
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

/* 🧠 MESSAGE BOXES (NEW CLEAN DESIGN) */
.msg{
max-width:75%;
padding:12px 14px;
border-radius:14px;
line-height:1.5;
white-space:pre-wrap;
word-wrap:break-word;
font-size:14px;
box-shadow:0 4px 20px rgba(0,0,0,0.3);
}

.user{
align-self:flex-end;
background:rgba(255,59,59,0.15);
border:1px solid rgba(255,59,59,0.3);
}

.ai{
align-self:flex-start;
background:rgba(0,255,102,0.08);
border:1px solid rgba(0,255,102,0.2);
}

img{
max-width:100%;
border-radius:12px;
margin-top:8px;
}

#bottom{
padding:12px;
background:rgba(0,0,0,0.7);
display:flex;
flex-direction:column;
gap:10px;
}

textarea{
width:100%;
padding:12px;
border-radius:12px;
border:none;
outline:none;
background:#111;
color:white;
resize:none;
font-size:14px;
}

.buttons{
display:flex;
gap:10px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
color:white;
font-family:'Space Mono';
}

#send{
background:linear-gradient(90deg,var(--red),var(--green));
}

#imgBtn{
background:linear-gradient(90deg,var(--green),var(--red));
}

</style>
</head>

<body>

<header>UMN CORE</header>

<div id="chat"></div>

<div id="bottom">

<textarea id="input" rows="2" placeholder="Speak to UMN Core..."></textarea>

<div class="buttons">
<button id="send">GROQ CORE</button>
<button id="imgBtn">MELON FORGE</button>
</div>

</div>

<script>

const chat=document.getElementById("chat");
const input=document.getElementById("input");

function addMsg(text,type){

const div=document.createElement("div");
div.className="msg "+type;
div.innerHTML=text;

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

/* CHAT */
async function send(){

const text=input.value.trim();
if(!text)return;

addMsg(text,"user");
input.value="";

try{

const res=await fetch("https://YOUR-NEW-VERCEL-URL.vercel.app/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

const data=await res.json();

addMsg(data.reply,"ai");

}catch(err){
addMsg("ERROR: "+err.message,"ai");
}

}

/* IMAGE */
function img(){

const text=input.value.trim();
if(!text)return;

addMsg(text,"user");

const url="https://image.pollinations.ai/prompt/"+encodeURIComponent(
"red green neon UMN style "+text
);

addMsg(`<img src="${url}">`,"ai");

input.value="";
}

document.getElementById("send").onclick=send;
document.getElementById("imgBtn").onclick=img;

</script>

</body>
</html>
